name: 功能建议
description: 对 OPPO Pods Manager 提出功能建议或改进想法
title: "[建议] "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述
      description: 简单描述你想要的功能或改进
      placeholder: 比如：希望增加电量过低时弹窗提醒
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 什么情况下会用到这个功能，能解决什么问题
      placeholder: 当我戴着耳机打游戏时，电量低了自己不会注意...
    validations:
      required: true
