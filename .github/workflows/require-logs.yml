name: Require log file

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  require-log-file:
    name: Check log file
    runs-on: ubuntu-latest
    steps:
      - name: Check log file
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const logSectionMatch = body.match(/### 日志文件([\s\S]*?)(?:\n### |$)/);
            const logSection = logSectionMatch ? logSectionMatch[1].trim() : '';
            const hasAttachment = /https:\/\/(?:github\.com\/user-attachments\/files\/|user-images\.githubusercontent\.com\/|private-user-images\.githubusercontent\.com\/)/i.test(logSection);

            if (hasAttachment) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'missing logs'
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              if (issue.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'open'
                });
              }
              return;
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['missing logs']
              });
            } catch (error) {
              core.warning(`Failed to add missing logs label: ${error.message}`);
            }

            const marker = '<!-- require-log-file -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            const alreadyCommented = comments.some(comment => comment.body && comment.body.includes(marker));

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `${marker}\n未检测到日志文件附件，请上传日志文件后重新打开 Issue。`
              });
            }

            if (issue.state !== 'closed') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }
